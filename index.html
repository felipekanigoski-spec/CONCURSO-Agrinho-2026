<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026 - Jogos do Futuro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌾 Concurso Agrinho 2026</h1>
        <p>Tecnologia e Sustentabilidade Alimentando o Mundo</p>
    </header>

    <main class="container">
        <div id="jogo-tela">
            <h2 id="pergunta-texto">Carregando pergunta...</h2>
            <div id="caixa-opcoes" class="opcoes-container">
                </div>
        </div>

        <div id="resultado-tela" class="resultado-tela">
            <h2>Fim do Jogo!</h2>
            <p id="mensagem-final" style="font-size: 1.2rem; margin-bottom: 15px; font-weight: bold;"></p>
            <button class="btn-reiniciar" onclick="reiniciarJogo()">Jogar Novamente</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
