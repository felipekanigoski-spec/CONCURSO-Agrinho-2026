<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026 - Hub de Inovação Agrícola</title>
    <style>
        /* CONFIGURAÇÕES GERAIS - DARK TECH */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #0c1115;
            color: #d1dad1;
            padding-top: 70px;
        }

        /* BARRA DE NAVEGAÇÃO */
        nav {
            background-color: #070a0c;
            border-bottom: 2px solid #00ff66;
            padding: 15px 20px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        nav .logo {
            color: #00ff66;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.2rem;
        }

        nav .links a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        nav .links a:hover {
            color: #00ff66;
        }

        /* CONTAINER PRINCIPAL */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
