        * {
            margin: 0;
            padding: 0;

            font-family: 'Arial', sans-serif;

        body {

            padding: 20px;
        }

            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #1b5e20;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            color: #4caf50;
        }

        .container {

            box-shadow: 0 8px 24px rgba(0,0,0,0.15);

        }

            color: #2e7d32;
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-opcao:hover {
            background-color: #c8e6c9;
            transform: scale(1.02);
        }

            border-color: #b71c1c !important;
        }
